{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0 mt-5">
            <div class="card-body p-5">
                <h3 class="card-title text-center mb-4">會員登入</h3>
                <form action="{{ url_for('auth.login') }}" method="POST">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email 電子信箱</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">密碼</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">登入</button>
                    </div>
                </form>
                <hr class="my-4">
                <p class="text-center mb-0">還沒有帳號嗎？ <a href="{{ url_for('auth.register') }}" class="text-decoration-none">立即註冊</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
