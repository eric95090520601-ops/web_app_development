{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4 p-md-5">
                <h2 class="card-title fw-bold mb-4"><i class="bi bi-pencil"></i> 編輯食譜</h2>
                
                <form action="{{ url_for('recipe.edit', id=recipe.id) }}" method="POST">
                    <div class="mb-3">
                        <label for="title" class="form-label fw-bold">食譜名稱 <span class="text-danger">*</span></label>
                        <input type="text" class="form-control" id="title" name="title" value="{{ recipe.title }}" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="description" class="form-label fw-bold">簡介</label>
                        <textarea class="form-control" id="description" name="description" rows="2">{{ recipe.description or '' }}</textarea>
                    </div>
                    
                    <div class="mb-4">
                        <label for="ingredients" class="form-label fw-bold">食材清單 <span class="text-danger">*</span></label>
                        <textarea class="form-control" id="ingredients" name="ingredients" rows="4" required>{{ recipe.ingredients }}</textarea>
                    </div>
                    
                    <div class="mb-4">
                        <label for="steps" class="form-label fw-bold">烹飪步驟 <span class="text-danger">*</span></label>
                        <textarea class="form-control" id="steps" name="steps" rows="6" required>{{ recipe.steps }}</textarea>
                    </div>
                    
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('recipe.detail', id=recipe.id) }}" class="btn btn-outline-secondary px-4">取消</a>
                        <button type="submit" class="btn btn-primary px-5">儲存變更</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
